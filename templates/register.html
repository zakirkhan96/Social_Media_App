{% extends 'base.html' %}

{% block content %}

<div class="bg-white p-6 rounded-xl shadow max-w-md mx-auto">

<h2 class="text-xl font-bold mb-4 text-center">Create Account</h2>

<form method="POST" class="space-y-4">
    {% csrf_token %}

    <!-- Username -->
    <div>
        <label class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" name="username"
            class="w-full mt-1 border p-2 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
            required>
    </div>

    <!-- Password -->
    <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" name="password1"
            class="w-full mt-1 border p-2 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
            required>
    </div>

    <!-- Confirm Password -->
    <div>
        <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
        <input type="password" name="password2"
            class="w-full mt-1 border p-2 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
            required>
    </div>

    <!-- Errors -->
    {% if form.errors %}
    <div class="bg-red-100 text-red-600 p-2 rounded">
        {{ form.errors }}
    </div>
    {% endif %}

    <button class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">
        Register
    </button>

</form>

<p class="text-center mt-4 text-sm">
    Already have an account?
    <a href="/login/" class="text-blue-500 hover:underline">Login</a>
</p>

</div>

{% endblock %}
